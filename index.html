<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Competencias · Visma</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        background: #F9F5F1;
        color: #131313;
        -webkit-font-smoothing: antialiased;
      }
      :root {
        --visma-purple: #7F56FA;
        --visma-purple-dark: #5B35C8;
        --visma-purple-light: #EEEDFE;
        --visma-purple-mid: #AFA9EC;
        --visma-black: #131313;
        --visma-white: #FEFEFE;
        --visma-orange: #FFAB65;
        --visma-creme: #F9F5F1;
        --visma-cool-grey: #B9C4C9;
        --visma-cool-grey-light: #E7EBEC;
        --color-background-primary: #FEFEFE;
        --color-background-secondary: #F9F5F1;
        --color-background-tertiary: #F0EDE8;
        --color-text-primary: #131313;
        --color-text-secondary: #5a5a58;
        --color-text-tertiary: #9a9a96;
        --color-border-tertiary: rgba(0,0,0,0.10);
        --color-border-secondary: rgba(0,0,0,0.20);
        --font-sans: 'Inter', -apple-system, sans-serif;
        --font-mono: 'SF Mono', 'Fira Code', monospace;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-background-primary: #1c1c1a;
          --color-background-secondary: #252522;
          --color-background-tertiary: #111110;
          --color-text-primary: #f0ede8;
          --color-text-secondary: #a8a79e;
          --color-text-tertiary: #6b6a63;
          --color-border-tertiary: rgba(255,255,255,0.10);
          --color-border-secondary: rgba(255,255,255,0.18);
          --visma-creme: #1c1c1a;
        }
        body { background: #111110; color: #f0ede8; }
      }
      input, select, textarea {
        font-family: inherit; font-size: 13px;
        padding: 8px 11px; border-radius: 8px;
        border: 0.5px solid var(--color-border-secondary);
        background: var(--color-background-primary);
        color: var(--color-text-primary);
        outline: none; width: 100%;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      input:focus, select:focus {
        border-color: var(--visma-purple);
        box-shadow: 0 0 0 3px rgba(127,86,250,0.15);
      }
      button { font-family: inherit; transition: all 0.12s; }
      button:active { transform: scale(0.98); }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--color-border-secondary); border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
