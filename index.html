<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Competencias</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        font-size: 14px;
        color: #1a1a1a;
        background: #f5f5f3;
      }
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f3;
        --color-background-tertiary: #ebebea;
        --color-text-primary: #1a1a1a;
        --color-text-secondary: #5f5e5a;
        --color-text-tertiary: #888780;
        --color-border-tertiary: rgba(0,0,0,0.12);
        --color-border-secondary: rgba(0,0,0,0.22);
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        --font-mono: 'SF Mono', 'Fira Code', monospace;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-background-primary: #1c1c1a;
          --color-background-secondary: #252522;
          --color-background-tertiary: #111110;
          --color-text-primary: #ebebea;
          --color-text-secondary: #a8a79e;
          --color-text-tertiary: #6b6a63;
          --color-border-tertiary: rgba(255,255,255,0.10);
          --color-border-secondary: rgba(255,255,255,0.18);
        }
        body { color: #ebebea; background: #111110; }
      }
      input, select, textarea {
        font-family: inherit; font-size: 13px;
        padding: 7px 10px; border-radius: 8px;
        border: 0.5px solid var(--color-border-secondary);
        background: var(--color-background-primary);
        color: var(--color-text-primary);
        outline: none; width: 100%;
      }
      input:focus, select:focus { box-shadow: 0 0 0 2px rgba(83,74,183,0.25); border-color: #534AB7; }
      button { font-family: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
